name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Simulate Gradle Build
      run: echo "Gradle build simulation complete!"

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Simulate Docker Build & Push
      run: |
        echo "Successfully authenticated Mcakohli's Docker Hub account!"
        echo "Simulating: docker build -t mcakohli/demo-app:latest ."
        echo "Simulating: docker push mcakohli/demo-app:latest"
        echo "Pipeline completed with 100% success!"
